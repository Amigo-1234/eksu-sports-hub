<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Match Center</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="match.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<header class="match-header-bar">

<div class="match-nav">

<a href="index.html" class="back-btn">

<svg width="22" height="22" viewBox="0 0 24 24" fill="none">

<path d="M15 18L9 12L15 6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

</svg>

</a>

<div class="match-page-title">
Match Center
</div>

</div>

</header>


<section class="match-center">

<div class="competition" id="competition"></div>

<div class="teams">

<div class="team">

<img src="ball.png" class="team-badge">

<div id="homeTeam"></div>

</div>

<div class="score" id="score"></div>

<div class="team">

<img src="ball.png" class="team-badge">

<div id="awayTeam"></div>

</div>

</div>

<div class="match-status">

<span class="status-badge live">LIVE</span>

<span id="matchTime"></span>

</div>

</section>

<div class="match-tabs">

<div class="tab active" data-tab="summary">Summary</div>

<div class="tab" data-tab="lineups">Lineups</div>

<div class="tab" data-tab="stats">Stats</div>

<div class="tab" data-tab="h2h">H2H</div>

</div>


<div class="tab-content">

<div id="summary" class="tab-panel active">

<div class="events-list">

<div class="event-row goal-event">
<span class="minute">21'</span>
<span class="event-icon goal">⚽</span>
<span class="event-player">Taiwo</span>
<span class="event-team">Engineering</span>
</div>


<div class="event-row">

<span class="minute">33'</span>

<span class="event-icon yellow">🟨</span>

<span class="event-player">Malik</span>

<span class="event-team">Agric</span>

</div>


<div class="event-row">

<span class="minute">60'</span>

<span class="event-icon sub">🔁</span>

<span class="event-player">Substitution</span>

<span class="event-team">Engineering</span>

</div>

</div>

</div>

</div>

<div id="lineups" class="tab-panel">

<div class="pitch">

  <div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

  <div class="penalty-box top"></div>
<div class="penalty-box bottom"></div>

<div class="goal-box top"></div>
<div class="goal-box bottom"></div>

<div class="player gk">
<div class="player-circle">1</div>
<div class="player-name">Benji</div>
</div>

<div class="player cb1">
<div class="player-circle">4</div>
<div class="player-name">Imole</div>
</div>

<div class="player cb2">
<div class="player-circle">5</div>
<div class="player-name">Tunde</div>
</div>

<div class="player lb">
<div class="player-circle">3</div>
<div class="player-name">Ayo</div>
</div>

<div class="player rb">
<div class="player-circle">2</div>
<div class="player-name">Seun</div>
</div>

<div class="player cm1">
<div class="player-circle">8</div>
<div class="player-name">Malik</div>
</div>

<div class="player cm2">
<div class="player-circle">10</div>
<div class="player-name">Ore</div>
</div>

<div class="player lw">
<div class="player-circle">11</div>
<div class="player-name">Muheez</div>
</div>

<div class="player rw">
<div class="player-circle">7</div>
<div class="player-name">Kola</div>
</div>

<div class="player st">
<div class="player-circle">9</div>
<div class="player-name">Taiwo</div>
</div>

</div>

</div>


<div id="stats" class="tab-panel">

Match statistics will appear here.

</div>


<div id="h2h" class="tab-panel">

Previous meetings between teams.

</div>

</div>


<script src="match.js"></script>

</body>

</html>
