<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Match Center</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="match.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<header class="match-header-bar">

<div class="match-nav">

<a href="index.html" class="back-btn">

<svg width="22" height="22" viewBox="0 0 24 24" fill="none">

<path d="M15 18L9 12L15 6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

</svg>

</a>

<div class="match-page-title">
Match Center
</div>

</div>

</header>


<section class="match-center">

<div class="competition" id="competition"></div>

<div class="teams">

<div class="team">

<img src="ball.png" class="team-badge">

<div id="homeTeam"></div>

</div>

<div class="score" id="score"></div>

<div class="team">

<img src="ball.png" class="team-badge">

<div id="awayTeam"></div>

</div>

</div>

<div class="match-time" id="matchTime"></div>

</section>

<div class="match-tabs">

<div class="tab active" data-tab="summary">Summary</div>

<div class="tab" data-tab="lineups">Lineups</div>

<div class="tab" data-tab="stats">Stats</div>

<div class="tab" data-tab="h2h">H2H</div>

</div>


<div class="tab-content">

<div id="summary" class="tab-panel active">

<div class="timeline">

<div class="timeline-event left">

<span class="minute">21'</span>

<span class="event-icon">⚽</span>

<span class="event-text">Taiwo</span>

</div>

<div class="timeline-event right">

<span class="minute">33'</span>

<span class="event-icon">🟨</span>

<span class="event-text">Malik</span>

</div>

</div>

</div>

<div id="lineups" class="tab-panel">

Starting lineups will appear here.

</div>


<div id="stats" class="tab-panel">

Match statistics will appear here.

</div>


<div id="h2h" class="tab-panel">

Previous meetings between teams.

</div>

</div>


<script src="match.js"></script>

</body>

</html>
